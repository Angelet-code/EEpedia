  <style>
    .calc-hero {
      background: linear-gradient(135deg, #0e1014 0%, #08090b 100%);
      text-align: center; padding: 48px 32px 40px;
      border-radius: 0 0 40px 40px; margin-bottom: 0;
    }
    .calc-hero h1 { color: #e8eaed; font-size: 2.8rem; margin-bottom: 8px; border: none; }
    .calc-hero p { color: #9aa0ab; font-size: 1.05rem; max-width: 520px; margin: 0 auto; }
    .calc-hero-logo { height: 64px; margin-bottom: 12px; filter: drop-shadow(0 0 12px rgba(212,168,75,0.3)); }
    .calc-layout {
      display: flex; gap: 24px; max-width: 100%; padding: 0 32px 60px; margin-top: -12px;
    }
    .calc-left { flex: 1; min-width: 0; padding-top: 12px; }
    .calc-right { width: 420px; flex-shrink: 0; }
    .calc-right-inner { position: sticky; top: 76px; display: flex; flex-direction: column; gap: 14px; }

    .calc-tabs {
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
      margin: 8px 0 16px; padding-bottom: 4px;
    }
    .calc-tabs::-webkit-scrollbar { display: none; }
    .calc-tab {
      padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-subtle);
      background: var(--bg-card); cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; font-weight: 500; color: var(--fg-secondary); white-space: nowrap;
      transition: all 0.15s; box-shadow: var(--shadow-sm);
      font-family: 'Inter', sans-serif;
    }
    .calc-tab img { width: 40px; height: 40px; object-fit: contain; opacity: 0.65; transition: opacity 0.15s; }
    .calc-tab:hover img { opacity: 0.9; }
    .calc-tab.active img { opacity: 1; }
    .calc-tab:hover { box-shadow: var(--shadow-md); color: var(--fg-primary); }
    .calc-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .calc-unit-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .calc-unit-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 14px 16px;
      box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px;
      transition: all 0.2s;
    }
    .calc-unit-card:hover { box-shadow: var(--shadow-md); }
    .calc-unit-card.active { border-color: rgba(255,105,0,0.3); border-left: 3px solid var(--accent); background: rgba(255,105,0,0.02); }
    .calc-unit-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-subtle); flex-shrink: 0; }
    .calc-unit-info { flex: 1; min-width: 0; }
    .calc-unit-info h4 { font-size: 0.84rem; color: var(--fg-primary); margin: 0 0 2px; border: none; padding: 0; font-weight: 600; }
    .calc-unit-ep {
      font-size: 0.65rem; font-weight: 500; padding: 1px 8px; border-radius: 100px;
      background: var(--accent-soft); color: var(--accent); display: inline-block; margin-bottom: 4px;
    }
    .calc-unit-costs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 0.7rem; color: var(--fg-muted); }
    .calc-unit-costs img { width: 15px; height: 15px; object-fit: contain; }
    .calc-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .calc-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-visible);
      background: var(--bg-card); cursor: pointer; font-size: 1rem; font-weight: 600;
      color: var(--fg-primary); display: flex; align-items: center; justify-content: center;
      transition: all 0.12s; line-height: 1; user-select: none;
    }
    .calc-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .calc-qty {
      width: 32px; text-align: center; border: 1px solid var(--border-subtle); border-radius: 6px;
      padding: 4px 2px; font-size: 0.82rem; font-weight: 600; color: var(--fg-primary);
      background: var(--bg-card); font-family: 'Inter', sans-serif;
    }
    .calc-qty:focus { outline: none; border-color: var(--accent); }

    .result-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 24px 26px; box-shadow: var(--shadow-sm);
    }
    .result-card h3 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin: 0 0 14px; border: none; padding: 0; }
    .result-big { font-size: 2.4rem; font-weight: 700; color: var(--fg-primary); line-height: 1.1; margin-bottom: 8px; }
    .result-res-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .result-res-row img { width: 22px; height: 22px; object-fit: contain; }
    .result-res-row .res-val { font-size: 1.15rem; font-weight: 600; color: var(--fg-primary); min-width: 70px; }
    .result-res-row .res-label { font-size: 0.75rem; color: var(--fg-muted); margin-left: auto; }
    .result-res-row.zero .res-val, .result-res-row.zero .res-label { color: #ccc; opacity: 0.5; }

    .calc-bar-wrap { margin: 8px 0 4px; }
    .calc-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: #e8e8e8; }
    .calc-bar-seg.food { background: #6b8c42; } .calc-bar-seg.wood { background: #8b6914; }
    .calc-bar-seg.stone { background: #7a7a7a; } .calc-bar-seg.gold { background: #d4a84b; }
    .calc-bar-seg.iron { background: #6e7f8a; }
    .calc-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.7rem; color: var(--fg-muted); margin-top: 4px; }

    .calc-bld-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.82rem; }
    .calc-bld-row .bld-name { color: var(--fg-secondary); }
    .calc-bld-row .bld-count { font-weight: 600; color: var(--fg-primary); }
    .calc-bld-row.zero .bld-name, .calc-bld-row.zero .bld-count { color: #ccc; opacity: 0.5; }

    .empty-state { text-align: center; padding: 30px; color: var(--fg-muted); font-size: 0.85rem; }
    .empty-state p { margin: 0; }

    .calc-reset { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; border-radius: 8px; border: 1px solid #e0e0e0; background: var(--bg-card); cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--fg-muted); transition: all 0.15s; margin-top: 12px; }
    .calc-reset:hover { border-color: var(--red); color: var(--red); }
    .calc-copy { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--bg-card); cursor: pointer; font-size: 0.78rem; font-weight: 500; color: var(--fg-muted); transition: all 0.15s; margin-top: 12px; float: right; }
    .calc-copy:hover { border-color: var(--accent); color: var(--accent); }
    .calc-copy.copied { border-color: var(--green); color: var(--green); }

    @media (max-width: 900px) {
      .calc-layout { flex-direction: column; padding: 0 16px 40px; }
      .calc-right { width: 100%; }
      .calc-right-inner { position: static; }
      .calc-unit-grid { grid-template-columns: 1fr; }
      .calc-hero h1 { font-size: 2rem; }
    }

      ],

      ],
      "Cyber": [

        { name: "Pandora I", f: 180, w: 0, s: 0, g: 180, i: 0, img: "pandora-icon.png", ep: "Digital" },
        { name: "Hyperion I", f: 230, w: 0, s: 0, g: 230, i: 0, img: "hyperion-icon.png", ep: "Digital" },
        { name: "Minotauro I", f: 180, w: 0, s: 0, g: 180, i: 0, img: "minotaur-icon.png", ep: "Digital" },
        { name: "Apollo", f: 180, w: 0, s: 0, g: 0, i: 180, img: "apollo-icon.png", ep: "Digital" },
        { name: "Furia", f: 180, w: 0, s: 0, g: 0, i: 180, img: "cyber-icon.png", ep: "Digital" },
        { name: "Tempest", f: 200, w: 0, s: 0, g: 0, i: 200, img: "tempest-icon.png", ep: "Digital" },
        { name: "Zeus", f: 280, w: 0, s: 0, g: 280, i: 0, img: "zeus-icon.png", ep: "Nano" },
        { name: "Ares II", f: 200, w: 0, s: 0, g: 200, i: 0, img: "cyber-icon.png", ep: "Nano" },
        { name: "Pandora II", f: 180, w: 0, s: 0, g: 180, i: 0, img: "pandora-icon.png", ep: "Nano" },
        { name: "Hyperion II", f: 230, w: 0, s: 0, g: 230, i: 0, img: "hyperion-icon.png", ep: "Nano" },
        { name: "Minotauro II", f: 180, w: 0, s: 0, g: 180, i: 0, img: "minotaur-icon.png", ep: "Nano" },
        { name: "Hades", f: 160, w: 0, s: 0, g: 0, i: 160, img: "hades-icon.png", ep: "Nano" },
        { name: "Poseidón", f: 140, w: 0, s: 0, g: 0, i: 240, img: "poseidon-icon.png", ep: "Nano" }
      ]
    };

    const counts = {};
    const buildingNames = Object.keys(buildings);
    let activeTab = buildingNames[0];

    function initCounts() {
      buildingNames.forEach(function(b) {
        counts[b] = {};
        buildings[b].forEach(function(u, idx) { counts[b][idx] = 0; });
      });
    }

    function getTotals() {
      var food = 0, wood = 0, stone = 0, gold = 0, iron = 0, totalUnits = 0;
      buildingNames.forEach(function(b) {
        buildings[b].forEach(function(u, idx) {
          var c = counts[b][idx];
          if (c > 0) {
            food += u.f * c; wood += u.w * c; stone += u.s * c;
            gold += u.g * c; iron += u.i * c; totalUnits += c;
          }
        });
      });
      return { food, wood, stone, gold, iron, total: totalUnits };
    }

    function getBuildingTotals() {
      var bt = {};
      buildingNames.forEach(function(b) {
        var t = 0;
        buildings[b].forEach(function(u, idx) { t += counts[b][idx]; });
        bt[b] = t;
      });
      return bt;
    }

    function updateResults() {
      var totals = getTotals();
      var bt = getBuildingTotals();
      var grandTotal = totals.food + totals.wood + totals.stone + totals.gold + totals.iron;
      var panel = document.getElementById('resultsPanel');

      if (totals.total === 0) {
        panel.innerHTML = '<div class="result-card"><div class="empty-state"><p>Añade unidades para ver<br>el coste total en recursos</p></div></div>';
        return;
      }

      var resources = [
        { key: 'food', label: 'Comida', img: 'food-icon.png', val: totals.food },
        { key: 'wood', label: 'Madera', img: 'wood-icon.png', val: totals.wood },
        { key: 'stone', label: 'Piedra', img: 'stone-icon.png', val: totals.stone },
        { key: 'gold', label: 'Oro', img: 'gold-icon.png', val: totals.gold },
        { key: 'iron', label: 'Hierro', img: 'iron-icon.png', val: totals.iron }
      ];

      var resRows = resources.map(function(r) {
        return '<div class="result-res-row' + (r.val === 0 ? ' zero' : '') + '">' +
          '<img src="assets/img/' + r.img + '" alt="">' +
          '<span class="res-val">' + r.val.toLocaleString('es-ES') + '</span>' +
          '<span class="res-label">' + (grandTotal > 0 ? (r.val / grandTotal * 100).toFixed(0) + '%' : '') + '</span>' +
        '</div>';
      }).join('');

      var barSegs = resources.filter(function(r) { return r.val > 0; }).map(function(r) {
        return '<div class="calc-bar-seg ' + r.key + '" style="width:' + (r.val / grandTotal * 100).toFixed(1) + '%"></div>';
      }).join('');

      var legendItems = resources.filter(function(r) { return r.val > 0; }).map(function(r) {
        return '<span style="color:var(--fg-muted)">' + r.label + ' ' + (r.val / grandTotal * 100).toFixed(0) + '%</span>';
      }).join(' ');

      var bldRows = buildingNames.map(function(b) {
        var t = bt[b];
        return '<div class="calc-bld-row' + (t === 0 ? ' zero' : '') + '"><span class="bld-name">' + b + '</span><span class="bld-count">' + t + ' uds</span></div>';
      }).join('');

      panel.innerHTML =
        '<div class="result-card">' +
          '<h3>Resumen</h3>' +
          '<div class="result-big">' + totals.total + ' unidades</div>' +
          resRows +
        '</div>' +
        '<div class="result-card">' +
          '<h3>Radiografía del coste</h3>' +
          '<div class="calc-bar-wrap"><div class="calc-bar">' + barSegs + '</div></div>' +
          '<div class="calc-legend">' + legendItems + '</div>' +
        '</div>' +
        '<div class="result-card">' +
          '<h3>Por edificio</h3>' +
          bldRows +
        '</div>' +
        '<button class="calc-copy" id="copyBtn" onclick="copyResults()">📋 Copiar</button>';
    }

    function copyResults() {
      var totals = getTotals();
      var text = 'Coste total:\\n' +
        'Comida: ' + totals.food.toLocaleString('es-ES') + '\\n' +
        'Madera: ' + totals.wood.toLocaleString('es-ES') + '\\n' +
        'Piedra: ' + totals.stone.toLocaleString('es-ES') + '\\n' +
        'Oro: ' + totals.gold.toLocaleString('es-ES') + '\\n' +
        'Hierro: ' + totals.iron.toLocaleString('es-ES');
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('copyBtn');
        btn.textContent = '✓ Copiado';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function renderAll() {
      renderTabs();
      renderUnitGrid(activeTab);
      updateResults();
    }

    function setCount(buildingName, unitIndex, val) {
      val = parseInt(val) || 0;
      counts[buildingName][unitIndex] = Math.max(0, val);
      renderAll();
    }

    function changeCount(buildingName, unitIndex, delta) {
      counts[buildingName][unitIndex] = Math.max(0, counts[buildingName][unitIndex] + delta);
      renderAll();
    }

    function resetAll() {
      buildingNames.forEach(function(b) {
        buildings[b].forEach(function(u, idx) { counts[b][idx] = 0; });
      });
      renderAll();
    }

    function renderTabs() {
      var tabIcons = {
        "Barracón": "barracks-icon.png",
        "Arquería": "archery-range-icon.png",
        "Establo": "stable-icon.png",
        "F. Tanques": "tank-factory-icon.png",
        "F. Asedio": "siege-factory-icon.png",
        "Astillero": "dock-icon.png",
        "Aeropuerto": "airport-icon.png",
        "Capitolio": "capitol-icon.png",
        "Templo": "temple-icon.png",
        "Cyber": "cyber-icon.png"
      };
      var tabsDiv = document.getElementById('calcTabs');
      tabsDiv.innerHTML = '';
      buildingNames.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'calc-tab' + (b === activeTab ? ' active' : '');
        btn.innerHTML = '<img src="assets/img/' + (tabIcons[b] || 'empire-earth-icon.png') + '" alt="">' + b;
        btn.onclick = function() { activeTab = b; renderAll(); };
        tabsDiv.appendChild(btn);
      });
    }

    function renderUnitGrid(buildingName) {
      var grid = document.getElementById('unitGrid');
      grid.innerHTML = '';
      var units = buildings[buildingName];
      units.forEach(function(u, idx) {
        var costParts = [];
        if (u.f > 0) costParts.push('<img src="assets/img/food-icon.png" alt=""> ' + u.f);
        if (u.w > 0) costParts.push('<img src="assets/img/wood-icon.png" alt=""> ' + u.w);
        if (u.s > 0) costParts.push('<img src="assets/img/stone-icon.png" alt=""> ' + u.s);
        if (u.g > 0) costParts.push('<img src="assets/img/gold-icon.png" alt=""> ' + u.g);
        if (u.i > 0) costParts.push('<img src="assets/img/iron-icon.png" alt=""> ' + u.i);

        var c = counts[buildingName][idx];
        var card = document.createElement('div');
        card.className = 'calc-unit-card' + (c > 0 ? ' active' : '');
        card.innerHTML =
          '<img src="assets/img/' + (u.img ? u.img : 'empire-earth-icon.png') + '" class="calc-unit-img" alt="">' +
          '<div class="calc-unit-info">' +
            '<h4>' + u.name + '</h4>' +
            '<span class="calc-unit-ep">' + u.ep + '</span>' +
            '<div class="calc-unit-costs">' + (costParts.length > 0 ? costParts.join('') : '—') + '</div>' +
          '</div>' +
          '<div class="calc-controls">' +
            '<button class="calc-btn" onclick="changeCount(\'' + buildingName + '\',' + idx + ',-1)">−</button>' +
            '<input class="calc-qty" type="text" value="' + c + '" onchange="setCount(\'' + buildingName + '\',' + idx + ',this.value)" onfocus="this.select()">' +
            '<button class="calc-btn" onclick="changeCount(\'' + buildingName + '\',' + idx + ',1)">+</button>' +
          '</div>';
        grid.appendChild(card);
      });
    }

    initCounts();
    renderTabs();
    renderAll();
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  </script>
